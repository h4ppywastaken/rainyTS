[Rainmeter]
Update=250
AccurateText=1
BackgroundMode=Transparent
SkinWidth=[MeterBG:W]
SkinHeight=0
OnRefreshAction=[!ZPos 2]

[Metadata]
Name=rainyTS
Author=rainyTS
Version=1.0.0
License=MIT
Information=TeamSpeak 6 channel voice overlay

[Variables]
@include=#@#Settings.inc
@include2=#@#Styles.inc

; ----- Lua script measure (reads TS6Data.txt, updates UI) -----
[MeasureLua]
Measure=Script
ScriptFile=#@#Script.lua
UpdateDivider=1

; ----- PowerShell back-end (connects to TS6 Remote Apps) -----
[MeasureRunTS6]
Measure=Plugin
Plugin=RunCommand
Program=pwsh.exe
Parameter=-NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -File "#@#TS6Client.ps1"
State=Hide
OutputType=""
DynamicVariables=1

; ==================== BACKGROUND ====================

[MeterBG]
Meter=Shape
X=0
Y=0
W=#SkinWidth#
H=(#PaddingY# * 2 + #MaxUsers# * #LineHeight# + 28)
Shape=Rectangle 0,0,#SkinWidth#,(#PaddingY#*2+#MaxUsers#*#LineHeight#+28),4,4 | Fill Color #ColorBG# | StrokeWidth 1 | Stroke Color #ColorBorder#
DynamicVariables=1

; ==================== CHANNEL HEADER ====================

[MeterChannelName]
Meter=String
MeterStyle=StyleChannel
X=#PaddingX#
Y=(#PaddingY# - 2)
Text=[MeasureLua:GetChannelName()]
DynamicVariables=1

; ==================== USER METERS (24 slots) ====================

[MeterUserGlow1]
Meter=Shape
X=(#PaddingX# - 3)
Y=(#PaddingY# + 16 + 0 * #LineHeight# + 1)
W=(#UserIconSize# + 6)
H=(#UserIconSize# + 6)
Shape=Ellipse (#UserIconSize#/2+3),(#UserIconSize#/2+3),(#UserIconSize#/2+3),(#UserIconSize#/2+3) | Fill Color #ColorGlow# | StrokeWidth 0
Hidden=1
DynamicVariables=1

[MeterUserIcon1]
