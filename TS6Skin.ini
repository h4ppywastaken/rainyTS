X=#PaddingX#
Y=(#PaddingY# + 16 + 0 * #LineHeight# + 4)
W=#UserIconSize#
H=#UserIconSize#
Shape=Ellipse (#UserIconSize#/2),(#UserIconSize#/2),(#UserIconSize#/2),(#UserIconSize#/2) | Fill Color #UColor1# | StrokeWidth 0
DynamicVariables=1

[MeterUserName1]
